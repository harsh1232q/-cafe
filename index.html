<div class="banner">

        <button class="button" onclick="window.location.href='menu.html'">
            <strong>Explore Menu</strong>
            <span></span>
        </button>
    </div>

    <!-- Animated video change section -->
    <script>
    const videos = [
        "Media/index11.mp4",
        "Media/index22.mp4",
        "Media/index33.mp4"
    ];

    const videoEls = document.querySelectorAll(".bgVideo");

    let index = 0;
    let active = 0;

    function changeVideo() {
        const next = (active + 1) % 2;

        videoEls[next].src = videos[index];
        videoEls[next].load();
        videoEls[next].play();

        videoEls[next].classList.add("active");
        videoEls[active].classList.remove("active");

        active = next;
        index = (index + 1) % videos.length;
    }

    changeVideo();
    setInterval(changeVideo, 4000);
    </script>

</div>

</body>
