<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="shop">
    <!-- Navbar -->
    <nav class="navbar">
        <img src="Media/logo.png" class="logo" alt="BBHS Café Logo">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html" class="active">Menu</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="cafe.html">Café Analytics</a></li>
            <li>
                <a href="cart.html" class="cart-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span id="cart-count">0</span>
                </a>
            </li>
        </ul>
    </nav>






    <!-- Background Video and info below navbar -->
    <header class="shop-hero">
        <video class="hero-video" autoplay muted loop playsinline>
            <source src="Media/menu.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay">
            <h1>BBHS CAFÉ <span class="neon">MENU</span></h1>
            <p>Discover a range of hot drinks, cold beverages, breakfast items, and café favourites freshly prepared by students every Tuesday and Thursday morning.</p>
        </div>
    </header>






       <!-- Left side section of the shop where u can search and filter -->
    <div class="shop-layout">
        <aside class="sidebar">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search menu items...">
            </div>

            <div class="filter-section">
                <h4>SORT BY</h4>
                <button class="sort active" data-sort="default">Default</button>
                <button class="sort" data-sort="low-to-high">Price: Low to High</button>
                <button class="sort" data-sort="high-to-low">Price: High to Low</button>
            </div>

            <div class="filter-section">
                <h4>CATEGORIES</h4>
                <button class="filter active" data-filter="all">All Items</button>
                <button class="filter" data-filter="Hot Drinks">Hot Drinks</button>
                <button class="filter" data-filter="Cold Drinks">Cold Drinks</button>
                <button class="filter" data-filter="Breakfast">Breakfast</button>
                <button class="filter" data-filter="Extras">Extras</button>
                </div>
        </aside>

        <main class="product-grid" id="product-list">
            </main>
    </div>






       <!-- Link to JS -->
    <script src="JS/menu.js"></script>
</body>
</html>
